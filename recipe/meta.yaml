{% set name = "whatrecord" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 506cc3cbe228d9b6ac8aa7b285836ad9f18ee39e587fe8fadb1d2d0d819d8197

build:
  entry_points:
    - whatrecord = whatrecord.bin.main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools_scm >=6.2
  run:
    - python >={{ python_min }}
    - aiohttp
    - apischema
    - epicsmacrolib
    - graphviz
    - jinja2
    - lark
    - python-graphviz <0.18

test:
  imports:
    - whatrecord
  commands:
    - whatrecord --help
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/pcdshub/whatrecord
  doc_url: https://pcdshub.github.io/whatrecord
  dev_url: https://github.com/pcdshub/whatrecord
  license: LicenseRef-BSD-3-Clause-SLAC
  license_family: BSD
  license_file: LICENSE.md
  summary: EPICS IOC meta information tool for indexing and searching

extra:
  recipe-maintainers:
    - conda-forge/pcdsdevices
